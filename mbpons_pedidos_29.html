<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --brand: #1a3a2a;
  --brand-light: #2d6045;
  --accent: #e8a020;
  --accent-light: #fef3dc;
  --bg: #f5f3ef;
  --surface: #ffffff;
  --border: #e0ddd7;
  --text: #1a1a18;
  --muted: #6b6860;
  --danger: #c0392b;
  --success: #1a3a2a;
  --whatsapp: #25D366;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
.header { background: var(--brand); color: white; padding: 0 1rem; position: sticky; top: 0; z-index: 100; }
.header-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
.logo { font-family: 'DM Serif Display', serif; font-size: 18px; letter-spacing: 0.01em; }
.logo span { color: var(--accent); }
.cart-btn { background: var(--accent); border: none; color: var(--brand); font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 14px; padding: 8px 16px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: opacity 0.15s; }
.cart-btn:hover { opacity: 0.9; }
.cart-count { background: var(--brand); color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }

/* SEARCH & FILTERS */
.controls { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 1rem; position: sticky; top: 56px; z-index: 99; }
.controls-inner { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
.search-box { position: relative; }
.search-box input { width: 100%; padding: 10px 16px 10px 40px; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s; }
.search-box input:focus { border-color: var(--brand-light); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; }
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-btn { padding: 6px 14px; border: 1.5px solid var(--border); border-radius: 20px; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.filter-btn:hover { border-color: var(--brand-light); color: var(--brand); }
.filter-btn.active { background: var(--brand); border-color: var(--brand); color: white; }

/* MAIN */
.main { max-width: 900px; margin: 0 auto; padding: 1rem; }
.section-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin: 1.5rem 0 0.75rem; }
.section-title:first-child { margin-top: 0; }

/* PRODUCT GRID */
.prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 7px; }
.prod-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; padding: 9px 10px; display: flex; flex-direction: row; align-items: center; gap: 10px; transition: border-color 0.15s, transform 0.1s; }
.prod-card:hover { border-color: var(--brand-light); transform: translateY(-1px); }
.prod-img-wrap { flex-shrink: 0; width: 54px; height: 54px; background: var(--bg); border-radius: 7px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.prod-img { width: 54px; height: 54px; object-fit: contain; }
.prod-img-placeholder { font-size: 24px; line-height: 1; }
.prod-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
.prod-brand { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
.prod-name { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.3; }
.prod-price { font-size: 13px; font-weight: 600; color: var(--brand); margin-top: 2px; }
.prod-actions { flex-shrink: 0; }
.qty-row { display: flex; align-items: center; gap: 4px; }
.qty-btn { width: 26px; height: 26px; border: 1.5px solid var(--border); border-radius: 6px; background: var(--bg); cursor: pointer; font-size: 15px; color: var(--text); display: flex; align-items: center; justify-content: center; transition: all 0.1s; font-family: 'DM Sans', sans-serif; }
.qty-btn:hover { background: var(--brand); border-color: var(--brand); color: white; }
.qty-num { font-size: 13px; font-weight: 500; min-width: 18px; text-align: center; }
.in-cart { background: #e8f5ee; border-color: var(--brand-light) !important; }

/* CART PANEL */
.cart-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; }
.cart-overlay.open { display: block; }
.cart-panel { position: fixed; right: 0; top: 0; bottom: 0; width: min(420px, 100vw); background: var(--surface); z-index: 201; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.25s ease; }
.cart-panel.open { transform: translateX(0); }
.cart-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.cart-header h2 { font-family: 'DM Serif Display', serif; font-size: 20px; }
.close-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--muted); line-height: 1; padding: 4px; }
.cart-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
.cliente-field { margin-bottom: 1rem; }
.cliente-field label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 6px; font-weight: 500; }
.cliente-field input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; color: var(--text); }
.cliente-field input:focus { border-color: var(--brand-light); }
.cart-empty { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 14px; }
.cart-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.cart-item-name { flex: 1; font-size: 13px; line-height: 1.3; }
.cart-item-brand { font-size: 11px; color: var(--muted); display: block; }
.cart-item-qty { display: flex; align-items: center; gap: 6px; }
.cart-item-price { font-size: 13px; font-weight: 600; color: var(--brand); min-width: 80px; text-align: right; }
.cart-footer { padding: 16px 20px; border-top: 1px solid var(--border); }
.total-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
.total-label { font-size: 14px; color: var(--muted); }
.total-amount { font-size: 22px; font-weight: 600; color: var(--brand); }
.wa-btn { width: 100%; padding: 14px; background: var(--whatsapp); border: none; border-radius: 10px; color: white; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: opacity 0.15s; }
.wa-btn:hover { opacity: 0.9; }
.wa-btn svg { width: 22px; height: 22px; fill: white; }

/* EMPTY STATE */
.empty-state { text-align: center; padding: 4rem 1rem; color: var(--muted); }

/* RESPONSIVE */
@media (max-width: 600px) {
  .prod-grid { grid-template-columns: 1fr; gap: 6px; }
  .prod-card { padding: 8px 10px; }
  .prod-name { font-size: 11px; }
  .prod-price { font-size: 12px; }
}
</style>
</head>

const prodImgs = {
  'ADVANCE': {
    'perro_cachorro': 'https://advancebio.com.ar/wp-content/uploads/2023/04/Diseno-sin-titulo-42-450x450.png',
    'perro_adulto':   'https://advancebio.com.ar/wp-content/uploads/2025/12/7-450x450.png',
    'perro_snack':    'https://advancebio.com.ar/wp-content/uploads/2024/10/Cookies-Carne.png',
    'gato_kitten':    'https://advancebio.com.ar/wp-content/uploads/2024/10/Gatos-All-Breeds-Kitten.png',
    'gato_adulto':    'https://advancebio.com.ar/wp-content/uploads/2024/10/Gatos-All-Breeds-Adulto.png',
  },
  'OLD PRINCE': {
    'perro_cachorro': 'https://oldprince.com.ar/wp-content/uploads/2023/06/Mockup_Equilibrium-Cachorro-MyG-300x500.png',
    'perro_adulto':   'https://oldprince.com.ar/wp-content/uploads/2023/06/Mockup_Equilibrium-Adulto-MyG-1-300x500.png',
    'gato_adulto':    'https://oldprince.com.ar/wp-content/uploads/2023/06/Mockup_Equilibrium-Gato-Adulto-300x500.png',
    'gato_kitten':    'https://oldprince.com.ar/wp-content/uploads/2023/06/Mockup_Equilibrium-Kitten-300x500.png',
  },
};

const catEmoji = { perro: '🐶', gato: '🐱', hueso: '🦴', accesorio: '🏠', forraje: '🌾', granazo: '🐄' };

function getProdImg(p) {
  if (imgPorCodigo[p.id]) return imgPorCodigo[p.id];
  const m = prodImgs[p.marca];
  if (!m) return null;
  const key = p.cat + '_' + (p.sub || 'adulto');
  return m[key] || m[p.cat + '_adulto'] || null;
}

function renderAll() {
  const busq = document.getElementById('buscar').value.toLowerCase();
  const filtrados = productos.filter(p => {
    const matchCat = catActual === 'todos' || p.cat === catActual;
    const matchBusq = !busq || p.nombre.toLowerCase().includes(busq) || p.marca.toLowerCase().includes(busq) || p.presentacion.toLowerCase().includes(busq);
    return matchCat && matchBusq;
  });

  // Agrupar por marca
  const grupos = {};
  filtrados.forEach(p => {
    if (!grupos[p.marca]) grupos[p.marca] = [];
    grupos[p.marca].push(p);
  });

  const main = document.getElementById('main-content');
  if (filtrados.length === 0) {
    main.innerHTML = '<div class="empty-state"><p>Sin resultados para esa búsqueda</p></div>';
    return;
  }

  main.innerHTML = Object.entries(grupos).map(([marca, prods]) => `
    <div class="section-title">${marca}</div>
    <div class="prod-grid">
      ${prods.map(p => {
        const qty = carrito[p.id] ? carrito[p.id].qty : 0;
        const src = getProdImg(p);
        const emoji = catEmoji[p.cat] || '📦';
        const imgHTML = src
          ? `<img class="prod-img" src="${src}" alt="${p.nombre}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          : '';
        const placeholderStyle = src ? 'display:none' : '';
        return `<div class="prod-card ${qty > 0 ? 'in-cart' : ''}" id="card-${p.id}">
          <div class="prod-img-wrap">
            ${imgHTML}
            <div class="prod-img-placeholder" style="${placeholderStyle}">${emoji}</div>
          </div>
          <div class="prod-info">
            <span class="prod-brand">${p.marca}</span>
            <span class="prod-name">${p.nombre}${p.presentacion ? ' — ' + p.presentacion : ''}</span>
            <span class="prod-price">$${Math.round(p.precio).toLocaleString('es-AR')}</span>
          </div>
          <div class="prod-actions">
            <div class="qty-row">
              <button class="qty-btn" onclick="cambiarQty('${p.id}',-1)">−</button>
              <span class="qty-num" id="qty-${p.id}">${qty}</span>
              <button class="qty-btn" onclick="cambiarQty('${p.id}',1)">+</button>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
  `).join('');
}

function cambiarQty(id, delta) {
  const p = productos.find(x => x.id === id);
  if (!carrito[id]) carrito[id] = { ...p, qty: 0 };
  carrito[id].qty = Math.max(0, carrito[id].qty + delta);
  if (carrito[id].qty === 0) delete carrito[id];
  const qEl = document.getElementById('qty-' + id);
  const cEl = document.getElementById('card-' + id);
  if (qEl) qEl.textContent = carrito[id] ? carrito[id].qty : 0;
  if (cEl) cEl.classList.toggle('in-cart', !!carrito[id]);
  actualizarBadge();
  if (document.getElementById('cart-panel').classList.contains('open')) renderCarrito();
}

function actualizarBadge() {
  const total = Object.values(carrito).reduce((s, i) => s + i.qty, 0);
  document.getElementById('cart-count').textContent = total;
}

function abrirCarrito() {
  document.getElementById('overlay').classList.add('open');
  document.getElementById('cart-panel').classList.add('open');
  renderCarrito();
}

function cerrarCarrito() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('cart-panel').classList.remove('open');
}

function renderCarrito() {
  const items = Object.values(carrito);
  const cont = document.getElementById('cart-items-list');
  if (items.length === 0) {
    cont.innerHTML = '<div class="cart-empty">Todavía no agregaste productos.<br>Buscá en el catálogo y tocá + para agregar.</div>';
    document.getElementById('total-monto').textContent = '$0';
    return;
  }
  cont.innerHTML = items.map(i => `
    <div class="cart-item">
      <div class="cart-item-name">
        <span class="cart-item-brand">${i.marca}</span>
        ${i.nombre}${i.presentacion ? ' — ' + i.presentacion : ''}
      </div>
      <div class="cart-item-qty">
        <button class="qty-btn" onclick="cambiarQty('${i.id}',-1)" style="width:24px;height:24px;font-size:14px;">−</button>
        <span>${i.qty}</span>
        <button class="qty-btn" onclick="cambiarQty('${i.id}',1)" style="width:24px;height:24px;font-size:14px;">+</button>
      </div>
      <span class="cart-item-price">$${Math.round(i.precio * i.qty).toLocaleString('es-AR')}</span>
    </div>`).join('');
  const total = items.reduce((s, i) => s + i.precio * i.qty, 0);
  document.getElementById('total-monto').textContent = '$' + Math.round(total).toLocaleString('es-AR');
}

function enviarWhatsApp() {
  const nombre = document.getElementById('nombre-cliente').value.trim();
  const items = Object.values(carrito);
  if (!nombre) { alert('Por favor ingresá tu nombre antes de enviar el pedido.'); return; }
  if (items.length === 0) { alert('No hay productos en el pedido.'); return; }
  const total = items.reduce((s, i) => s + i.precio * i.qty, 0);
  let msg = `*PEDIDO - MBPONS Distribuciones*\n`;
  msg += `*Cliente:* ${nombre}\n`;
  msg += `*Fecha:* ${new Date().toLocaleDateString('es-AR')}\n\n`;
  msg += `*Productos:*\n`;
  items.forEach(i => {
    msg += `• ${i.marca} ${i.nombre}${i.presentacion ? ' ' + i.presentacion : ''} x *${i.qty}* = $${Math.round(i.precio * i.qty).toLocaleString('es-AR')}\n`;
  });
  msg += `\n*TOTAL: $${Math.round(total).toLocaleString('es-AR')}*`;
  window.open(`https://wa.me/${TU_NUMERO}?text=${encodeURIComponent(msg)}`, '_blank');
}

renderAll();
</script>
